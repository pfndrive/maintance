<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFNDrive - Maintenance</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            position: absolute;
            background: rgba(30, 41, 59, 0.3);
            padding: 1rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        .marquee-top {
            top: 5%;
        }

        .marquee-bottom {
            bottom: 5%;
        }

        .marquee-content {
            display: inline-block;
        }

        .scroll-left {
            animation: scroll-left 180s linear infinite;
        }

        .scroll-right {
            animation: scroll-right 180s linear infinite;
        }

        .marquee-content span {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-color);
            padding: 0 3rem;
            font-weight: 500;
            opacity: 0.7;
        }

        .marquee-content span::after {
            content: "•";
            margin-left: 3rem;
            color: var(--text-secondary);
            opacity: 0.3;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scroll-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* Ambient background glow */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(50px);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="marquee-container marquee-top">
        <div class="marquee-content scroll-left" id="hoster-list-top"></div>
    </div>

    <div class="container">
        <h1>PFNDrive Maintenance</h1>
        <p>We will be back shortly with Hoster and Streaming Site Support.<br>Thank you for your patience.</p>
    </div>

    <div class="marquee-container marquee-bottom">
        <div class="marquee-content scroll-right" id="hoster-list-bottom"></div>
    </div>

    <script>
        const hosters = "Rapidgator, 1Fichier, ClicknUpload, DDownload, Filer, 4Shared, Hitfile, Mediafire, Mega, PixelDrain, Yandex Disk, Turbobit, YouTube, Twitch, Pan Baidu, Hexload, FileStore.me, Worldbytez, Terabytez, Pornhub, XVideos, Hentai Foundry, XHamster, RapidRAR, Alfafile, DailyUploads, Archive.org, Wupfile, Krakenfiles, GoFile, Data Nodes, Comedy Central, DailyMotion, DrTuber, Bilibili, TikTok, TLC, Niconico, NYTimes, Panopto, OdNoklassniki, Reddit, RedGifs, RUTube, SoundCloud, SpankBang, Steam (Video), SunPorNo, StripChat, Vimeo, VK, BBC, Beeg, RedTube, XNXX, XXXYMovies, YouJizz, YouPorn, Yandex Video, NHentai, Buzzheavier, Fuckingfast, Qiwi, Rule34, Streamtape, Google Drive, GitHub, Kemono, Coomer, Bunkr, MegaUp, 4Tube, ABCNews, Acast, Aparat, Baidu Video, Camdemy, Chilloutzone, Audioboom, Audiomack, Annas Archive, Dailymail, Dctp, Dropbox, Ebaumsworld, Formula1, Foxnews, Gamestar, Idnes, Instagram, Imgur, Izlesene, Jamendo, Khanacademy, Kick, Kickstarter, Lcp, Nbcsports, Nfl, Streamable, APKAdmin, NexusMods, HAnime, Send, Twitter, Pillowcase, SwissTransfer, BlueSky, Loom, Facebook, Pinterest, Snapchat, Tumblr, Xiaohongshu, Nitroflare, Webshare, Terabox, Scribd, Dropapk, Katfile, Mixdrop, Sendspace, Isracloud, Filepress, Darkibox, ExtMatrix, FileFactory, ShareMods, 123Pan, Uploadhaven, MegaDB, files.vc, ViKiNG FiLE, Transfer.it, PikPak, Filecrypt".split(", ");

        const listTop = document.getElementById('hoster-list-top');
        const listBottom = document.getElementById('hoster-list-bottom');
        
        function populateMarquees() {
            const half = Math.ceil(hosters.length / 2);
            const topHosters = hosters.slice(0, half);
            const bottomHosters = hosters.slice(half);

            const topContent = topHosters.map(name => `<span>${name}</span>`).join('');
            const bottomContent = bottomHosters.map(name => `<span>${name}</span>`).join('');

            // Triple the content for extra long and smooth looping at slow speeds
            listTop.innerHTML = topContent + topContent + topContent;
            listBottom.innerHTML = bottomContent + bottomContent + bottomContent;
        }

        populateMarquees();
    </script>
</body>
</html>
